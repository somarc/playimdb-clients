<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayIMDB</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-play">▶</span>
        <span class="logo-text">Play<span class="logo-imdb">IMDB</span></span>
      </div>
    </header>

    <div class="search-bar">
      <input
        type="text"
        id="search-input"
        placeholder="Search movies, shows, titles…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="search-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <div id="status" class="status hidden"></div>

    <ul id="results" class="results" role="listbox"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
